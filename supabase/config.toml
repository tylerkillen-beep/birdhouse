# For local Supabase development with the CLI:
#   supabase start        — spins up local Postgres + Auth + Studio
#   supabase functions serve  — serves Edge Functions on http://localhost:9999
#   supabase db push      — applies pending migrations to the remote project
#
# Remote project: https://ljukrhneikqbabcmcpet.supabase.co

project_id = "birdhouse"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.get-sales-report]
verify_jwt = false

[functions.request-receipt]
verify_jwt = true

[analytics]
enabled = false
port = 54327
vector_port = 54328
gcp_project_id = ""
gcp_project_number = ""
gcp_jwt_path = "supabase/gcloud.json"
