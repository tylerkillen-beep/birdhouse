<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Birdhouse — Admin</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --red: #cc0000; --red-bright: #ff1a1a;
      --gray: #555; --light-gray: #999; --white: #f0f0f0;
      --card: #161616; --border: rgba(204,0,0,0.2); --border-dim: rgba(255,255,255,0.07);
    }
    body {
      background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(204,0,0,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(204,0,0,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    /* Ambient glow */
    body::after {
      content: ''; position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(204,0,0,0.08) 0%, transparent 70%);
      border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }

    .login-wrap {
      position: relative; z-index: 1;
      width: 420px; max-width: 95vw;
    }

    .login-logo {
      text-align: center; margin-bottom: 2.5rem;
    }
    .login-logo img {
      height: 72px;
      filter: drop-shadow(0 0 20px rgba(204,0,0,0.7));
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 0 60px rgba(204,0,0,0.08);
    }

    .login-eyebrow {
      font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--red); margin-bottom: 0.4rem;
    }
    .login-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem;
      letter-spacing: 0.05em; margin-bottom: 0.4rem;
    }
    .login-sub {
      font-size: 0.82rem; color: var(--gray); margin-bottom: 2rem; line-height: 1.5;
    }

    .admin-warning {
      background: rgba(204,0,0,0.07); border: 1px solid rgba(204,0,0,0.2);
      border-radius: 8px; padding: 0.85rem 1rem; margin-bottom: 1.75rem;
      font-size: 0.8rem; color: var(--light-gray); line-height: 1.5;
      display: flex; gap: 0.6rem; align-items: flex-start;
    }

    .btn-google {
      width: 100%; padding: 1rem; background: var(--red); color: white; border: none;
      border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.93rem;
      font-weight: 500; cursor: pointer; transition: all 0.2s; margin-top: 0.5rem;
      letter-spacing: 0.03em;
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
    }
    .btn-google:hover { background: var(--red-bright); box-shadow: 0 0 20px rgba(204,0,0,0.4); transform: translateY(-1px); }
    .btn-google:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .msg { margin-top: 1rem; padding: 0.85rem 1rem; border-radius: 8px; font-size: 0.83rem; display: none; }
    .msg.error { background: rgba(204,0,0,0.1); border: 1px solid rgba(204,0,0,0.3); color: #ff6b6b; display: block; }

    .back-link {
      display: block; text-align: center; margin-top: 1.5rem;
      font-size: 0.78rem; color: var(--gray); text-decoration: none;
      letter-spacing: 0.06em; transition: color 0.2s;
    }
    .back-link:hover { color: var(--light-gray); }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <img src="../logo.png" alt="The Birdhouse" />
    </div>
    <div class="login-card">
      <div class="login-eyebrow">Super Admin</div>
      <h1 class="login-title">Admin Login.</h1>
      <p class="login-sub">Restricted access. For authorized administrators only. Google sign-in required.</p>
      <div class="admin-warning">
        🔒 This area is for the business owner only. Student staff should use the Team Hub instead.
      </div>
      <button class="btn-google" id="login-btn" onclick="handleLogin()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2045c0-.6382-.0573-1.2518-.1636-1.8409H9v3.4818h4.8436c-.2086 1.125-.8432 2.0782-1.7963 2.7159v2.2586h2.9086c1.7027-1.5672 2.6836-3.8741 2.6836-6.6154z"/><path fill="#34A853" d="M9 18c2.43 0 4.4673-.8068 5.956-2.1804l-2.9086-2.2586c-.8068.54-1.8382.8591-3.0474.8591-2.3441 0-4.3282-1.5841-5.0363-3.7127H.9577v2.3327C2.4382 15.9832 5.4818 18 9 18z"/><path fill="#FBBC05" d="M3.9637 10.7073c-.18-.54-.2823-1.1168-.2823-1.7073s.1023-1.1673.2823-1.7073V4.9599H.9577C.3477 6.1745 0 7.55 0 9s.3477 2.8255.9577 4.0401l3.006-2.3328z"/><path fill="#EA4335" d="M9 3.5795c1.3214 0 2.5077.4541 3.4405 1.345l2.5809-2.5809C13.4632.8905 11.4268 0 9 0 5.4818 0 2.4382 2.0168.9573 4.9591l3.0063 2.3323C4.6718 5.1627 6.6559 3.5795 9 3.5795z"/></svg>
        Continue with Google
      </button>
      <div class="msg" id="login-msg"></div>
    </div>
    <a class="back-link" href="../index.html">← Back to home</a>
  </div>

  <script>
    const sb = supabase.createClient('https://ljukrhneikqbabcmcpet.supabase.co','sb_publishable_lWdxpZUHbQHiz04wthAC2g_X4ToxDCn');
    const OWNER_ADMIN_EMAIL = 'tylerkillen@nixaschools.net';

    function isOwnerAdmin(user) {
      return (user?.email || '').toLowerCase() === OWNER_ADMIN_EMAIL;
    }


    async function handleLogin() {
      const btn = document.getElementById('login-btn');
      const msg = document.getElementById('login-msg');
      btn.disabled = true;
      btn.innerHTML = btn.innerHTML.replace('Continue with Google', 'Redirecting...');
      msg.style.display = 'none';

      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: `${window.location.origin}/admin/login.html`,
          queryParams: { hd: 'nixaschools.net' }
        }
      });

      if(error) {
        msg.textContent = error.message; msg.className = 'msg error';
        btn.disabled = false;
        btn.innerHTML = btn.innerHTML.replace('Redirecting...', 'Continue with Google');
        return;
      }
    }

    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) {
        const email = session.user.email || '';
        if (!email.endsWith('@nixaschools.net') && !email.endsWith('@nixastudents.net')) {
          await sb.auth.signOut();
          const msg = document.getElementById('login-msg');
          msg.textContent = 'Only school Google accounts are allowed.';
          msg.className = 'msg error';
          return;
        }

        if(!isOwnerAdmin(session.user) && session.user?.user_metadata?.role !== 'admin') {
          await sb.auth.signOut();
          const msg = document.getElementById('login-msg');
          msg.textContent = 'This account does not have admin access.';
          msg.className = 'msg error';
          return;
        }

        window.location.href = 'index.html';
      }
    });

    // Keep existing hard access check for sessions already present on load
    sb.auth.getSession().then(async ({data}) => {
      const user = data.session?.user;
      if (!user) return;

      const email = user.email || '';
      if (!email.endsWith('@nixaschools.net') && !email.endsWith('@nixastudents.net')) {
        await sb.auth.signOut();
        const msg = document.getElementById('login-msg');
        msg.textContent = 'Only school Google accounts are allowed.';
        msg.className = 'msg error';
        return;
      }

      if(!isOwnerAdmin(user) && user.user_metadata?.role !== 'admin') {
        await sb.auth.signOut();
        const msg = document.getElementById('login-msg');
        msg.textContent = 'This account does not have admin access.';
        msg.className = 'msg error';
        return;
      }

      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
