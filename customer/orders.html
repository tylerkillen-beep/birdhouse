<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Birdhouse — My Orders</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black:#0a0a0a; --red:#cc0000; --red-bright:#ff1a1a; --gray:#888; --light-gray:#999; --white:#f0f0f0; --card:#141414; --border:rgba(204,0,0,0.18); --border-dim:rgba(255,255,255,0.07); }
    body { background:var(--black); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; }
    body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(204,0,0,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(204,0,0,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }
    :focus-visible { outline: 2px solid var(--red-bright); outline-offset: 3px; border-radius: 3px; }
    .skip-link { position: absolute; top: -100%; left: 1rem; background: var(--red-bright); color: #000; padding: 0.5rem 1rem; border-radius: 0 0 6px 6px; font-size: 0.85rem; font-weight: 500; text-decoration: none; z-index: 9999; }
    .skip-link:focus { top: 0; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; } }
    .layout { display:grid; grid-template-columns:220px 1fr; min-height:100vh; }
    .sidebar { background:#0d0000; border-right:1px solid var(--border); padding:1.75rem 1.25rem; position:sticky; top:0; height:100vh; display:flex; flex-direction:column; }
    .sidebar-logo img { height:38px; filter:drop-shadow(0 0 8px rgba(204,0,0,0.5)); margin-bottom:2rem; }
    .user-card { background:rgba(204,0,0,0.08); border:1px solid var(--border); border-radius:10px; padding:1rem; margin-bottom:1.75rem; }
    .user-name { font-size:0.9rem; color:var(--white); font-weight:500; }
    .user-points { font-size:0.72rem; color:var(--red-bright); margin-top:0.25rem; }
    nav { flex:1; }
    .nav-item { display:flex; align-items:center; gap:0.7rem; padding:0.7rem 0.9rem; border-radius:7px; color:var(--gray); font-size:0.85rem; text-decoration:none; cursor:pointer; transition:all 0.2s; margin-bottom:0.2rem; border:1px solid transparent; }
    .nav-item:hover { color:var(--white); background:rgba(255,255,255,0.04); }
    .nav-item.active { background:rgba(204,0,0,0.12); color:var(--red-bright); border-color:rgba(204,0,0,0.25); }
    .signout-btn { background:none; border:1px solid rgba(255,255,255,0.08); border-radius:7px; padding:0.65rem 1rem; color:var(--gray); font-size:0.8rem; cursor:pointer; width:100%; text-align:left; transition:all 0.2s; display:flex; align-items:center; gap:0.5rem; font-family:'DM Sans',sans-serif; }
    .signout-btn:hover { color:var(--white); }
    .main { padding:2.5rem 3rem; position:relative; z-index:1; }
    .page-eyebrow { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--red-bright); margin-bottom:0.3rem; }
    .page-title { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:0.04em; margin-bottom:0.3rem; }
    .page-sub { color:var(--light-gray); font-size:0.88rem; margin-bottom:1.75rem; }

    /* Filter tabs */
    .filter-row { display:flex; gap:0.6rem; margin-bottom:1.75rem; flex-wrap:wrap; }
    .filter-btn { background:transparent; border:1px solid var(--border-dim); border-radius:20px; padding:0.35rem 0.9rem; font-size:0.78rem; color:var(--gray); cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; }
    .filter-btn.active { background:rgba(204,0,0,0.12); border-color:var(--border); color:var(--red-bright); }
    .filter-btn:hover { border-color:var(--border); color:var(--white); }

    /* Order cards */
    .order-card { background:var(--card); border:1px solid var(--border-dim); border-radius:14px; padding:1.5rem; margin-bottom:0.85rem; display:grid; grid-template-columns:1fr auto; gap:1.5rem; align-items:start; transition:border-color 0.2s; position:relative; overflow:hidden; }
    .order-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
    .order-card.status-pending::before  { background:#ff9800; }
    .order-card.status-paid::before     { background:var(--red); }
    .order-card.status-delivered::before{ background:#4caf50; }
    .order-card.status-cancelled::before{ background:#444; }
    .order-card:hover { border-color:var(--border); }
    .order-card.status-delivered { opacity:0.75; }
    .order-card.status-cancelled { opacity:0.45; }

    .order-drink { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:0.04em; margin-bottom:0.3rem; }
    .order-customization { font-size:0.82rem; color:var(--light-gray); margin-bottom:0.75rem; line-height:1.6; }
    .order-delivery { font-size:0.82rem; color:var(--gray); display:flex; gap:1.5rem; flex-wrap:wrap; }
    .order-delivery span strong { color:var(--light-gray); }

    .order-right { text-align:right; }
    .status-badge { display:inline-block; padding:0.28rem 0.75rem; border-radius:20px; font-size:0.72rem; font-weight:500; margin-bottom:0.6rem; }
    .badge-pending   { background:rgba(255,152,0,0.1);  color:#ff9800;      border:1px solid rgba(255,152,0,0.25); }
    .badge-paid      { background:rgba(204,0,0,0.1);    color:var(--red-bright); border:1px solid var(--border); }
    .badge-delivered { background:rgba(0,200,80,0.1);   color:#4caf50;      border:1px solid rgba(0,200,80,0.25); }
    .badge-cancelled { background:rgba(255,255,255,0.05);color:var(--gray);  border:1px solid var(--border-dim); }
    .order-date { font-size:0.75rem; color:var(--gray); margin-top:0.3rem; }
    .order-points { font-size:0.75rem; color:var(--red-bright); margin-top:0.25rem; }

    /* Reorder button */
    .btn-reorder { background:rgba(204,0,0,0.08); color:var(--red-bright); border:1px solid var(--border); border-radius:7px; padding:0.45rem 0.9rem; font-size:0.78rem; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; margin-top:0.5rem; display:inline-block; text-decoration:none; }
    .btn-reorder:hover { background:rgba(204,0,0,0.15); }
    .btn-secondary { background:transparent; color:var(--light-gray); border:1px solid var(--border-dim); border-radius:7px; padding:0.42rem 0.75rem; font-size:0.74rem; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; margin-top:0.45rem; }
    .btn-secondary:hover { border-color:var(--border); color:var(--white); }
    .btn-secondary[disabled] { opacity:0.65; cursor:not-allowed; }
    .receipt-msg { margin-top:0.4rem; font-size:0.72rem; color:var(--light-gray); max-width:250px; margin-left:auto; }

    /* Review buttons */
    .btn-review { background:rgba(245,200,66,0.08); color:#f5c842; border:1px solid rgba(245,200,66,0.25); border-radius:6px; padding:0.25rem 0.65rem; font-size:0.72rem; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; margin-left:0.5rem; }
    .btn-review:hover { background:rgba(245,200,66,0.18); }
    .badge-reviewed { display:inline-block; color:#4caf50; font-size:0.72rem; margin-left:0.5rem; }

    /* Review modal */
    .review-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; display:none; align-items:center; justify-content:center; padding:1rem; }
    .review-overlay.open { display:flex; }
    .review-modal { background:#111; border:1px solid rgba(204,0,0,0.2); border-radius:16px; padding:2rem; width:480px; max-width:100%; }
    .review-modal-title { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:0.05em; margin-bottom:0.25rem; }
    .review-modal-sub { font-size:0.82rem; color:var(--light-gray); margin-bottom:1.5rem; }
    .star-selector { display:flex; gap:0.4rem; margin-bottom:1.25rem; }
    .star-selector .star { font-size:2rem; cursor:pointer; color:#333; transition:color 0.15s; line-height:1; background:none; border:none; padding:0; font-family:inherit; }
    .star-selector .star.lit { color:#f5c842; }
    .review-textarea { width:100%; background:#0d0d0d; border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:0.75rem 1rem; color:var(--white); font-family:'DM Sans',sans-serif; font-size:0.88rem; resize:vertical; min-height:100px; outline:none; transition:border-color 0.2s; }
    .review-textarea:focus { border-color:rgba(204,0,0,0.4); }
    .review-char-hint { font-size:0.7rem; color:var(--gray); margin-top:0.3rem; margin-bottom:1.25rem; }
    .review-actions { display:flex; gap:0.75rem; }
    .btn-review-submit { background:var(--red); color:white; border:none; border-radius:8px; padding:0.75rem 1.5rem; font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:500; cursor:pointer; transition:all 0.2s; }
    .btn-review-submit:hover { background:var(--red-bright); }
    .btn-review-submit:disabled { opacity:0.4; cursor:not-allowed; }
    .btn-review-cancel { background:transparent; color:var(--light-gray); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:0.75rem 1.25rem; font-family:'DM Sans',sans-serif; font-size:0.88rem; cursor:pointer; transition:all 0.2s; }
    .btn-review-cancel:hover { border-color:rgba(255,255,255,0.2); color:var(--white); }
    .review-msg { margin-top:0.75rem; font-size:0.82rem; padding:0.6rem 0.85rem; border-radius:7px; display:none; }
    .review-msg.ok  { background:rgba(76,175,80,0.1); color:#4caf50; border:1px solid rgba(76,175,80,0.2); }
    .review-msg.err { background:rgba(204,0,0,0.1); color:#ff6b6b; border:1px solid rgba(204,0,0,0.2); }

    .empty-state { text-align:center; padding:4rem 2rem; color:var(--gray); }
    .empty-icon { font-size:3rem; margin-bottom:1rem; opacity:0.4; }
    .empty-text { font-size:0.9rem; margin-bottom:1.5rem; }
    .btn-primary { background:var(--red); color:white; border:none; border-radius:8px; padding:0.85rem 1.75rem; font-family:'DM Sans',sans-serif; font-size:0.9rem; font-weight:500; cursor:pointer; transition:all 0.2s; text-decoration:none; display:inline-block; text-transform:uppercase; letter-spacing:0.06em; }
    .btn-primary:hover { background:var(--red-bright); box-shadow:0 0 20px rgba(204,0,0,0.4); }

    /* Summary stats */
    .summary-row { display:flex; gap:1rem; margin-bottom:2rem; flex-wrap:wrap; }
    .summary-chip { background:var(--card); border:1px solid var(--border-dim); border-radius:10px; padding:0.85rem 1.25rem; font-size:0.82rem; color:var(--light-gray); }
    .summary-chip strong { color:var(--red-bright); font-family:'Bebas Neue',sans-serif; font-size:1.4rem; display:block; letter-spacing:0.05em; }

    /* ── Mobile top bar ── */
    .mobile-topbar { display:none; position:fixed; top:0; left:0; right:0; height:54px; background:#0d0000; border-bottom:1px solid var(--border); z-index:300; align-items:center; justify-content:space-between; padding:0 1.25rem; }
    .mobile-topbar img { height:30px; filter:drop-shadow(0 0 6px rgba(204,0,0,0.5)); }
    .hamburger { background:none; border:none; cursor:pointer; display:flex; flex-direction:column; gap:5px; padding:6px; }
    .hamburger span { display:block; width:22px; height:2px; background:var(--white); border-radius:2px; transition:all 0.25s; }
    .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; }
    .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:250; }
    .sidebar-overlay.open { display:block; }
    @media(max-width:900px){
      .mobile-topbar { display:flex; }
      .layout{grid-template-columns:1fr}
      .sidebar { display:flex !important; position:fixed; top:0; left:0; bottom:0; width:280px; height:100%; transform:translateX(-100%); transition:transform 0.28s ease; z-index:260; overflow-y:auto; }
      .sidebar.open { transform:translateX(0); }
      .main{padding:1.5rem; padding-top:calc(1.5rem + 54px)}
      .order-card{grid-template-columns:1fr}
    }
    @media (prefers-reduced-motion: reduce) { .sidebar { transition: none !important; } }
  </style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div class="mobile-topbar">
  <a href="../index.html"><img src="../logo.png" alt="The Birdhouse" /></a>
  <button class="hamburger" id="hamburger-btn" onclick="toggleNav()" aria-label="Menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleNav()" aria-hidden="true"></div>
<div class="layout">
  <aside class="sidebar" aria-label="Customer portal navigation">
    <div class="sidebar-logo"><a href="../index.html"><img src="../logo.png" alt="The Birdhouse" /></a></div>
    <div class="user-card">
      <div class="user-name" id="user-display-name">Loading...</div>
      <div class="user-points" id="user-points-badge">$0.00 toward Birdhouse Bucks</div>
    </div>
    <nav aria-label="Customer portal">
      <a class="nav-item" href="dashboard.html">📊 Overview</a>
      <a class="nav-item" href="order.html">☕ Place an Order</a>
      <a class="nav-item active" href="orders.html" aria-current="page">📋 My Orders</a>
      <a class="nav-item" href="dashboard.html#subscription">📦 My Subscription</a>
      <a class="nav-item" href="dashboard.html#loyalty">⭐ Birdhouse Bucks</a>
    </nav>
    <button class="signout-btn" onclick="signOut()">← Sign Out</button>
  </aside>

  <main class="main" id="main-content">
    <div class="page-eyebrow">Customer Portal</div>
    <h1 class="page-title">My Orders</h1>

    <div class="summary-row" id="summary-row"></div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="filterOrders('all',this)">All Orders</button>
      <button class="filter-btn" onclick="filterOrders('active',this)">Active</button>
      <button class="filter-btn" onclick="filterOrders('delivered',this)">Delivered</button>
      <button class="filter-btn" onclick="filterOrders('cancelled',this)">Cancelled</button>
    </div>

    <div id="orders-container"><div style="color:var(--gray);text-align:center;padding:3rem">Loading your orders...</div></div>
  </main>
</div>

<!-- Review Modal -->
<div class="review-overlay" id="review-overlay" role="dialog" aria-modal="true" aria-labelledby="review-modal-title">
  <div class="review-modal">
    <h2 class="review-modal-title" id="review-modal-title">Leave a Review</h2>
    <div class="review-modal-sub" id="review-modal-sub">How was it?</div>
    <div class="star-selector" id="star-selector" role="group" aria-label="Star rating">
      <button class="star" data-val="1" onclick="setReviewStar(1)" aria-label="1 star">★</button>
      <button class="star" data-val="2" onclick="setReviewStar(2)" aria-label="2 stars">★</button>
      <button class="star" data-val="3" onclick="setReviewStar(3)" aria-label="3 stars">★</button>
      <button class="star" data-val="4" onclick="setReviewStar(4)" aria-label="4 stars">★</button>
      <button class="star" data-val="5" onclick="setReviewStar(5)" aria-label="5 stars">★</button>
    </div>
    <textarea class="review-textarea" id="review-text" placeholder="Tell others what you thought (optional)…" maxlength="500" aria-label="Review text (optional, up to 500 characters)"></textarea>
    <div class="review-char-hint" aria-hidden="true">Up to 500 characters</div>
    <div class="review-actions">
      <button class="btn-review-submit" id="review-submit-btn" onclick="submitReview()" disabled>Post Review</button>
      <button class="btn-review-cancel" onclick="closeReviewModal()">Cancel</button>
    </div>
    <div class="review-msg" id="review-msg"></div>
  </div>
</div>

<script>
  const sb = supabase.createClient('https://ljukrhneikqbabcmcpet.supabase.co','sb_publishable_lWdxpZUHbQHiz04wthAC2g_X4ToxDCn');
  let allOrders = [], currentUser = null;
  // Set of "menuItemId|orderId" strings the user has already reviewed
  let reviewedKeys = new Set();


  function resolveCustomerName(user, profile) {
    const meta = user.user_metadata || {};
    const firstName = meta.first_name || meta.given_name || '';
    const lastName = meta.last_name || meta.family_name || '';
    if (firstName) return { firstName, lastName };

    const fullName = (meta.full_name || meta.name || profile?.full_name || '').trim();
    if (fullName && !fullName.includes('@')) {
      const parts = fullName.split(/\s+/);
      return { firstName: parts[0], lastName: parts.slice(1).join(' ') };
    }
    return { firstName: 'Eagle', lastName: '' };
  }

  async function init() {
    const {data:{session}} = await sb.auth.getSession();
    if(!session){window.location.href='index.html';return;}
    // Use getUser() to fetch fresh server-side metadata so loyalty balances
    // are always current (getSession() returns a stale local cache).
    const { data: { user: freshUser } } = await sb.auth.getUser();
    currentUser = freshUser || session.user;
    const meta = currentUser.user_metadata || {};
    const { data: profile } = await sb.from('profiles').select('full_name, loyalty_spend_cents, loyalty_credit_cents').eq('id', currentUser.id).maybeSingle();
    const { firstName, lastName } = resolveCustomerName(currentUser, profile);
    document.getElementById('user-display-name').textContent = (firstName + ' ' + lastName).trim();
    const spendCents = profile?.loyalty_spend_cents ?? meta.loyalty_spend_cents ?? 0;
    const creditCents = profile?.loyalty_credit_cents ?? meta.loyalty_credit_cents ?? 0;
    const spendTowardNext = spendCents % 2500;
    if (creditCents > 0) {
      document.getElementById('user-points-badge').textContent = '$' + (creditCents / 100).toFixed(2) + ' credit available';
    } else {
      document.getElementById('user-points-badge').textContent = '$' + (spendTowardNext / 100).toFixed(2) + ' toward Birdhouse Bucks';
    }
    await loadOrders(profile, meta);
  }

  let userProfile = {};
  let userMeta = {};

  async function loadOrders(profile, meta) {
    if (profile) userProfile = profile;
    if (meta) userMeta = meta;
    const [{ data: orders }, { data: myReviews }] = await Promise.all([
      sb.from('orders').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }),
      sb.from('reviews').select('menu_item_id, order_id').eq('user_id', currentUser.id),
    ]);
    allOrders = orders || [];
    reviewedKeys = new Set((myReviews || []).map(r => `${r.menu_item_id}|${r.order_id}`));
    renderSummary();
    renderOrders('all');
  }

  function renderSummary() {
    const total     = allOrders.length;
    const delivered = allOrders.filter(o=>o.status==='delivered').length;
    const active    = allOrders.filter(o=>o.status==='pending'||o.status==='paid').length;
    const creditCents = userProfile?.loyalty_credit_cents ?? userMeta.loyalty_credit_cents ?? 0;
    const creditDisplay = '$' + (creditCents / 100).toFixed(2);
    document.getElementById('summary-row').innerHTML = `
      <div class="summary-chip"><strong>${total}</strong>Total Orders</div>
      <div class="summary-chip"><strong>${delivered}</strong>Delivered</div>
      ${active?`<div class="summary-chip"><strong style="color:#ff9800">${active}</strong>In Progress</div>`:''}
      <div class="summary-chip"><strong style="color:#f5c842">${creditDisplay}</strong>Credit Available</div>`;
  }

  function filterOrders(filter, btn) {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders(filter);
  }

  function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
  }

  function renderOrders(filter) {
    let list = allOrders;
    if(filter==='active')    list = allOrders.filter(o=>o.status==='pending'||o.status==='paid');
    if(filter==='delivered') list = allOrders.filter(o=>o.status==='delivered');
    if(filter==='cancelled') list = allOrders.filter(o=>o.status==='cancelled');

    const container = document.getElementById('orders-container');
    if(!list.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-icon">☕</div>
        <div class="empty-text">${filter==='all'?'No orders yet — place your first one!':'No '+filter+' orders.'}</div>
        ${filter==='all'?`<a class="btn-primary" href="order.html">Order Now</a>`:''}
      </div>`;
      return;
    }

    const statusLabel = {pending:'⏳ Pending Payment', paid:'💳 Being Prepared', delivered:'✅ Delivered', cancelled:'Cancelled'};
    container.innerHTML = list.map(order=>{
      const date = new Date(order.created_at).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      const time = new Date(order.created_at).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      const isDelivered = order.status === 'delivered';

      // Build the items section — use cart_items (multi-item) if available, otherwise legacy single-drink fields
      let itemsHtml = '';
      if (order.cart_items?.length) {
        itemsHtml = order.cart_items.map(i => {
          let reviewBtnHtml = '';
          if (isDelivered && i.id) {
            const key = `${i.id}|${order.id}`;
            if (reviewedKeys.has(key)) {
              reviewBtnHtml = `<span class="badge-reviewed">✓ Reviewed</span>`;
            } else {
              const safeName = i.name.replace(/'/g, "\\'");
              reviewBtnHtml = `<button class="btn-review" onclick="openReviewModal('${i.id}','${safeName}','${order.id}')">★ Review</button>`;
            }
          }
          return `<div style="margin-bottom:0.2rem;display:flex;align-items:center;flex-wrap:wrap;gap:0.25rem">${i.name} ×${i.quantity} &middot; ${i.temp==='iced'?'🧊 Iced':'☕ Hot'} &middot; <span style="color:var(--red-bright)">$${(i.price*i.quantity).toFixed(2)}</span>${reviewBtnHtml}</div>`;
        }).join('');
      } else {
        // Legacy single-drink order
        const extras = [order.size, order.milk, (order.syrup&&order.syrup!=='None'?order.syrup+' syrup':null)].filter(Boolean).join(' · ');
        let reviewBtnHtml = '';
        if (isDelivered && order.drink_name) {
          // Legacy orders don't have menu_item_id in cart, so we skip per-item reviews
          // and just show per-order review keyed by drink_name (no menu_item_id link)
        }
        itemsHtml = `<div>${order.drink_name}${extras?` &middot; <span style="color:var(--gray)">${extras}</span>`:''}</div>`;
      }

      const totalDisplay = order.total_amount
        ? `<div style="font-size:0.8rem;color:var(--light-gray);margin-top:0.35rem">$${parseFloat(order.total_amount).toFixed(2)}</div>`
        : '';

      return `<div class="order-card status-${order.status}">
        <div>
          <div class="order-drink">${order.drink_name}</div>
          <div class="order-customization">
            ${itemsHtml}
            ${order.special_instructions?`<div style="color:var(--gray);margin-top:0.3rem;font-size:0.78rem">Note: ${order.special_instructions}</div>`:''}
          </div>
          <div class="order-delivery">
            <span><strong>Room:</strong> ${order.room||'—'}</span>
            <span><strong>Time:</strong> ${order.delivery_time||'—'}</span>
            <span><strong>Day:</strong> ${order.delivery_day||'—'}</span>
          </div>
        </div>
        <div class="order-right">
          <div class="status-badge badge-${order.status}">${statusLabel[order.status]||order.status}</div>
          <div class="order-date">${date} at ${time}</div>
          ${totalDisplay}
          ${order.points_earned?`<div class="order-points">+${order.points_earned} pt${order.points_earned!==1?'s':''}</div>`:''}
          ${order.square_payment_id?`<button class="btn-secondary" data-receipt-btn="${order.id}" onclick="requestReceipt('${order.id}', this)">Get Receipt Link</button>`:''}
          <div class="receipt-msg" id="receipt-msg-${order.id}"></div>
          ${isDelivered?`<a class="btn-reorder" href="order.html">Order Again →</a>`:''}
        </div>
      </div>`;
    }).join('');
  }

  // ── Review Modal ──────────────────────────────────────────────────────────
  let reviewPendingItemId = null, reviewPendingOrderId = null, reviewRating = 0;

  function openReviewModal(menuItemId, menuItemName, orderId) {
    reviewPendingItemId  = menuItemId;
    reviewPendingOrderId = orderId;
    reviewRating = 0;
    document.getElementById('review-modal-title').textContent = menuItemName;
    document.getElementById('review-modal-sub').textContent   = 'How was your drink? Tap stars to rate.';
    document.getElementById('review-text').value = '';
    document.getElementById('review-msg').style.display = 'none';
    setReviewStar(0);
    document.getElementById('review-submit-btn').disabled = true;
    document.getElementById('review-overlay').classList.add('open');
  }

  function closeReviewModal() {
    document.getElementById('review-overlay').classList.remove('open');
    reviewPendingItemId = reviewPendingOrderId = null;
    reviewRating = 0;
  }

  function setReviewStar(val) {
    reviewRating = val;
    document.querySelectorAll('#star-selector .star').forEach(s => {
      s.classList.toggle('lit', parseInt(s.dataset.val) <= val);
    });
    document.getElementById('review-submit-btn').disabled = (val === 0);
  }

  async function submitReview() {
    if (!reviewRating || !reviewPendingItemId || !currentUser) return;
    const btn = document.getElementById('review-submit-btn');
    const msg = document.getElementById('review-msg');
    btn.disabled = true;
    btn.textContent = 'Posting…';
    msg.style.display = 'none';

    const meta = currentUser.user_metadata || {};
    const firstName = meta.first_name || meta.given_name || '';
    const lastName  = meta.last_name  || meta.family_name || '';
    const fullName  = firstName ? (firstName + (lastName ? ' ' + lastName : '')) : (meta.full_name || meta.name || 'Anonymous');

    const { error } = await sb.from('reviews').insert({
      user_id:      currentUser.id,
      menu_item_id: reviewPendingItemId,
      order_id:     reviewPendingOrderId,
      rating:       reviewRating,
      review_text:  document.getElementById('review-text').value.trim() || null,
      reviewer_name: fullName,
    });

    if (error) {
      msg.textContent = 'Could not post review. You may have already reviewed this drink.';
      msg.className   = 'review-msg err';
      msg.style.display = 'block';
      btn.disabled  = false;
      btn.textContent = 'Post Review';
      return;
    }

    // Update local state so button turns into badge without reload
    reviewedKeys.add(`${reviewPendingItemId}|${reviewPendingOrderId}`);
    msg.textContent   = 'Thanks for your review!';
    msg.className     = 'review-msg ok';
    msg.style.display = 'block';
    btn.textContent   = '✓ Posted';
    setTimeout(() => {
      closeReviewModal();
      // Re-render current filter to reflect the new badge
      const activeBtn = document.querySelector('.filter-btn.active');
      const filter = activeBtn ? activeBtn.textContent.toLowerCase().replace(' orders','').replace('all','all') : 'all';
      const filterMap = { 'all orders': 'all', 'active': 'active', 'delivered': 'delivered', 'cancelled': 'cancelled' };
      renderOrders(filterMap[activeBtn?.textContent.toLowerCase()] ?? 'all');
    }, 1200);
  }

  async function requestReceipt(orderId, btnEl) {
    const msgEl = document.getElementById(`receipt-msg-${orderId}`);
    if (btnEl) {
      btnEl.disabled = true;
      btnEl.textContent = 'Loading…';
    }
    if (msgEl) {
      msgEl.textContent = '';
      msgEl.style.color = 'var(--light-gray)';
    }

    try {
      const { data, error } = await sb.functions.invoke('request-receipt', {
        body: { orderId },
      });

      if (error || !data?.success) {
        let details = data?.error || error?.message || 'Unable to fetch receipt';
        if (error?.context) {
          try {
            const parsed = await error.context.json();
            if (parsed?.error) details = parsed.error;
          } catch (_) {
            // keep default message
          }
        }
        throw new Error(details);
      }

      window.open(data.receiptUrl, '_blank', 'noopener');
      if (btnEl) btnEl.textContent = 'Receipt Opened';
    } catch (err) {
      if (msgEl) {
        msgEl.textContent = err instanceof Error ? err.message : 'Unable to load receipt link.';
        msgEl.style.color = '#ff9800';
      }
      if (btnEl) btnEl.textContent = 'Try Again';
    } finally {
      if (btnEl) btnEl.disabled = false;
    }
  }

  async function signOut(){await sb.auth.signOut();window.location.href='index.html';}

  function toggleNav() {
    const sidebar   = document.querySelector('.sidebar');
    const overlay   = document.getElementById('sidebar-overlay');
    const hamburger = document.getElementById('hamburger-btn');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
    hamburger.classList.toggle('open');
    hamburger.setAttribute('aria-expanded', sidebar.classList.contains('open') ? 'true' : 'false');
  }

  init();
</script>
</body>
</html>
